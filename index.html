<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="sytyle.css">
</head>

<body>
    <div class="inputForm">
        <h1>Add your task </h1>
        <div class="container">
            <form action="#" id="addTaskForm">
                <label for="title">Title</label>
                <input type="text" name="newTitle" id="title" placeholder="Add the title">
                <label for="Description">Description</label>
                <textarea type="text" name="newDescription" id="Description"
                    placeholder="Add the Description"></textarea>
                <label for="Deadline">deadline</label>
                <input type="date" name="Deadline" id="Deadline">
                <label for="Priority">Priority</label>
                <select name="Priority" id="Priority">
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <button type="submit" class="submit_btn"> Add Task</button>
            </form>
        </div>
    </div>
    <div class="highPriorityTask">
        <div class="task">
            <input class="ckackbox" type="checkbox">

            <span class="title">SONA</span>
            <button  class="delete_btn">
                <img src="icons/delete_btn.png" alt="deleteIcon" width="18px">
            </button>

            <button class="edit_btn">
                <img src="icons/edit_icon.png" alt="edit_icon" width="20" >
            </button>

            <div class="Description">
                "VILLAGE TIKAR PAITHAN POST JURARAMPUR THESIL SAGRI
                AZAMGHAR DISTRICT, UTTAR PRADESH"
            </div>
            <span class="finishDate">Deadline: 2026-03-31</span>
            <span class="importance">Priority: High</span>
        </div>

    </div>
    <!-- <button class="icon-button">t
        <img src="icons/edit_icon.png" alt="">
    </button> -->
    <div class="mediumPriorityTask">
    </div>
    <div class="lowPriorityTask">
    </div>

    </div>

    <script src="modScript.js"></script>
</body>

</html>
